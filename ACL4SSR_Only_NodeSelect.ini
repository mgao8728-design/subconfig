[custom]
enable_rule_generator=true
overwrite_original_rules=true

# 1. 拦截
ruleset=REJECT,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt

# 2. 直连（局域网、私有地址）
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=DIRECT,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/private.txt

# 3. 代理（GFW列表）
ruleset=节点选择,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/gfw.txt
ruleset=节点选择,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/proxy.txt
ruleset=节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list

# 4. 国内直连
ruleset=DIRECT,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/direct.txt
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaIp.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=DIRECT,[]GEOIP,CN

# 5. 漏网之鱼
ruleset=节点选择,[]FINAL

# 策略组定义
custom_proxy_group=节点选择`select`[]自动测速-Google`[]自动测速-Googleconnectivitycheck`[]DIRECT`.*

custom_proxy_group=自动测速-Google`url-test`.*`http://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=自动测速-Googleconnectivitycheck`url-test`.*`http://connectivitycheck.gstatic.com/generate_204`300,5,50
